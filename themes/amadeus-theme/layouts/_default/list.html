{{ define "main" }}
<div class="module-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</div>
<div class="card-grid">
  {{ range .Pages.ByWeight }}
  <a href="{{ .RelPermalink }}" style="text-decoration:none;color:inherit">
    <div class="card">
      <h3>{{ .Title }}</h3>
      <p>{{ .Description }}</p>
      {{ with .Params.module_number }}<span class="term" style="background:#003580;color:#fff;padding:2px 8px;border-radius:12px;font-size:0.8rem">Module {{ . }}</span>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
